    }

    function spawnEncounter() {
      const encounterGhostCount = MIN_GHOST_COUNT + Math.floor(Math.random() * (MAX_GHOST_COUNT - MIN_GHOST_COUNT + 1));
      const bossCount = encounterGhostCount >= 15 && Math.random() < 0.38 ? 2 : 1;
      const wallGhostCount = Math.min(BASE_WALL_GHOST_COUNT, Math.max(3, Math.floor(encounterGhostCount * 0.4)));
      spawnShadows(wallGhostCount);
      const spawnedBosses = spawnBosses(bossCount);
      spawnFigures(encounterGhostCount - wallGhostCount - spawnedBosses);
      const remainder = encounterGhostCount - countAliveEnemies();
      if (remainder > 0) spawnShadows(remainder);
      totalGhosts = countAliveEnemies();
    }

    function returnToTitle() {
      clearTimeout(ghostAnnounceTimer);
      stopWhisperBGM(0.9);
      clearActiveEnemies();
      gameStarted = false;
      floorCleared = false;
      pauseOpen = false;
      score = 0;
      flashCharge = 1;
      flashTimer = 0;
      batteryLife = 1.0;
      totalGhosts = 0;
      ambienceTime = 0;
      isMoving = false;
      lastClickTime = 0;
      camera.position.set(startTile.x, 1.6, startTile.z);
      camera.rotation.set(0,0,0);
      titleScreen.style.display = 'flex';
      clearScreen.style.display = 'none';
      pauseScreen.style.display = 'none';
      ghostAnnounceEl.style.display = 'none';
      flashOverlay.style.background = 'rgba(255,255,220,0)';
      dreadOverlay.style.opacity = '0.1';
      scene.fog.density = BASE_FOG_DENSITY;
      ambientLight.intensity = BASE_AMBIENT_INTENSITY;
      moon.intensity = BASE_MOON_INTENSITY;
      flashlight.intensity = FLASHLIGHT_BASE_INTENSITY;
      flashlight.distance = FLASHLIGHT_BASE_DISTANCE;
      flashlight.angle = FLASHLIGHT_BASE_ANGLE;
      flashlight.penumbra = FLASHLIGHT_BASE_PENUMBRA;
      mmCanvas.style.opacity = '1';
      instructionsEl.style.opacity = '1';
      updateHUD();
      drawMinimap();
      if (document.pointerLockElement === renderer.domElement) {
        suppressPauseOnUnlock = true;
        document.exitPointerLock();
      }
    }

    function resumeRun() {
      if (!gameStarted || floorCleared || !pauseOpen) return;
      pauseOpen = false;
      pauseScreen.style.display = 'none';
      instructionsEl.style.opacity = '1';
      renderer.domElement.requestPointerLock();
    }

    function startRun() {
      clearTimeout(ghostAnnounceTimer);
      clearActiveEnemies();
      gameStarted = true;
      floorCleared = false;
      pauseOpen = false;
      score = 0;
      flashCharge = 1;
      flashTimer = 0;
      batteryLife = 1.0;
      ambienceTime = 0;
      isMoving = false;
      lastClickTime = 0;
      camera.position.set(startTile.x, 1.6, startTile.z);
      camera.rotation.set(0,0,0);
      startTime = performance.now();
      titleScreen.style.display = 'none';
      clearScreen.style.display = 'none';
      pauseScreen.style.display = 'none';
      ghostAnnounceEl.style.display = 'none';
      flashOverlay.style.background = 'rgba(255,255,220,0)';
      dreadOverlay.style.opacity = '0.1';
      scene.fog.density = BASE_FOG_DENSITY;
      ambientLight.intensity = BASE_AMBIENT_INTENSITY;
      moon.intensity = BASE_MOON_INTENSITY;
      flashlight.intensity = FLASHLIGHT_BASE_INTENSITY;
      flashlight.distance = FLASHLIGHT_BASE_DISTANCE;
      flashlight.angle = FLASHLIGHT_BASE_ANGLE;
      flashlight.penumbra = FLASHLIGHT_BASE_PENUMBRA;
      mmCanvas.style.opacity = '1';
      instructionsEl.style.opacity = '1';
      spawnEncounter();
      updateHUD();
      showGhostAnnouncement();
      try { startWhisperBGM(); } catch (e) {}
      renderer.domElement.requestPointerLock();
    }

    titleScreen.addEventListener('click', () => {
      titleScreen.style.display = 'none';
      startRun();
    });
    clearScreen.addEventListener('click', () => {
      startRun();
    });
    pauseResumeBtn.addEventListener('click', e => {
      e.stopPropagation();
      resumeRun();
    });
    pauseQuitBtn.addEventListener('click', e => {
      e.stopPropagation();
      returnToTitle();
    });
    document.addEventListener('keydown', e => {
      if (e.key !== 'Escape') return;
      if (pauseOpen) {
        e.preventDefault();
        returnToTitle();
        return;
      }
      if (gameStarted && !floorCleared && !isPointerLocked) {
        e.preventDefault();
        returnToTitle();
      }
    });

    function updateHUD() {
      const alive = countAliveEnemies();
      shadowCountEl.textContent = `REMAINING: ${alive}`;
      if (gameStarted && totalGhosts > 0) {
        const purified = Math.max(0, totalGhosts - alive);
        purifiedCountEl.textContent = `${purified}/${totalGhosts}`;
      } else {
        purifiedCountEl.textContent = '0/--';
      }
      const bars = Math.round(flashCharge*12);
      flashChargeEl.textContent = `FLASH: ${'█'.repeat(bars)}${'░'.repeat(12-bars)}`;
    }

    function checkClear() {
      if (floorCleared || countAliveEnemies() !== 0) return;
      floorCleared = true;
      const t = ((performance.now()-startTime)/1000).toFixed(1);
      clearStats.textContent = `${totalGhosts} ghosts cleared / ${t}s / SCORE ${score}`;
      clearScreen.style.display = 'flex';
      stopWhisperBGM(1.6);
      if (document.pointerLockElement === renderer.domElement) document.exitPointerLock();
    }

    // ===== Minimap =====
    const mmCanvas = document.getElementById('minimap');
    const mmCtx = mmCanvas.getContext('2d');
    const mmScale = 10;
    mmCanvas.width = COLS * mmScale;
    mmCanvas.height = ROWS * mmScale;

    function drawMinimap() {
      mmCtx.fillStyle = '#111'; mmCtx.fillRect(0,0,mmCanvas.width,mmCanvas.height);
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
        mmCtx.fillStyle = isWall(c,r) ? '#444' : '#222';
        mmCtx.fillRect(c*mmScale, r*mmScale, mmScale, mmScale);
      }
      // Player dot
      const {c: pc, r: pr} = w2t(camera.position.x, camera.position.z);
      mmCtx.fillStyle = '#ff0'; mmCtx.beginPath();
      mmCtx.arc(pc*mmScale+mmScale/2, pr*mmScale+mmScale/2, 3, 0, Math.PI*2);
      mmCtx.fill();
    }

    // ===== Game Loop =====
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      if (gameStarted && !floorCleared && !pauseOpen) {
        ambienceTime += dt;
        if (isMoving && isPointerLocked) {
          const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
          dir.y = 0; dir.normalize();
          const nx = camera.position.x + dir.x * 3 * dt;
          const nz = camera.position.z + dir.z * 3 * dt;
          if (canMove(nx, nz)) { camera.position.x = nx; camera.position.z = nz; }
          else if (canMove(nx, camera.position.z)) camera.position.x = nx;
          else if (canMove(camera.position.x, nz)) camera.position.z = nz;
        }
        flashCharge = Math.min(1, flashCharge + dt * 0.25);
        // Battery drain: decays from 1.0 → 0.3 over ~120 seconds
        batteryLife = Math.max(0.3, batteryLife - dt * (0.7 / 120));
        const nearestThreat = nearestThreatDistance(camera.position);
        const proximityFear = Number.isFinite(nearestThreat) ? Math.max(0, 1 - nearestThreat / 9.5) : 0;
        const batteryFear = Math.max(0, (1 - batteryLife) / 0.7);
        const dread = Math.min(1, proximityFear * 0.78 + batteryFear * 0.55);
        const reachFade = Math.pow(batteryFear, 1.15);
        const flickerStrength = batteryLife < 0.55 ? Math.min(1, (0.55 - batteryLife) / 0.25) : 0;
        const flicker = 1 - flickerStrength * (0.08 + 0.08 * Math.max(0, Math.sin(ambienceTime * 34 + dread * 6)));
        const beamDistance = THREE.MathUtils.lerp(FLASHLIGHT_BASE_DISTANCE, FLASHLIGHT_MIN_DISTANCE, reachFade) * (1 - dread * 0.04);
        const beamAngle = THREE.MathUtils.lerp(FLASHLIGHT_BASE_ANGLE, FLASHLIGHT_MIN_ANGLE, reachFade);

        ambientLight.intensity = BASE_AMBIENT_INTENSITY - dread * 0.55;
        moon.intensity = BASE_MOON_INTENSITY - dread * 0.12;
        scene.fog.density = BASE_FOG_DENSITY + dread * 0.016 + Math.sin(ambienceTime * 1.1) * 0.0015 * proximityFear;
        dreadOverlay.style.opacity = (0.1 + dread * 0.26 + Math.max(0, Math.sin(ambienceTime * 2.4)) * 0.03 * proximityFear).toFixed(2);
        flashlight.distance = beamDistance;
        flashlight.angle = Math.max(FLASHLIGHT_MIN_ANGLE * 0.94, beamAngle - dread * 0.055);
        flashlight.penumbra = THREE.MathUtils.clamp(FLASHLIGHT_BASE_PENUMBRA - reachFade * 0.18 + dread * 0.12, 0.26, 0.72);

        if (flashTimer > 0) {
          flashTimer = Math.max(0, flashTimer - dt);
          flashlight.intensity = FLASHLIGHT_FLASH_INTENSITY * batteryLife * (1 - dread * 0.1) * flicker;
          flashlight.distance = beamDistance * 1.08;
          flashOverlay.style.background = 'rgba(255,255,220,0.5)';
        } else {
          flashlight.intensity = FLASHLIGHT_BASE_INTENSITY * batteryLife * (1 - dread * 0.1) * flicker;
          flashOverlay.style.background = 'rgba(255,255,220,0)';
        }
        // Minimap fades with battery
        mmCanvas.style.opacity = (0.3 + batteryLife * 0.7).toFixed(2);
        const pDir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
        shadows.forEach(s => s.update(dt, camera.position, pDir));
        figures.forEach(f => f.update(dt, camera.position));
        bosses.forEach(b => b.update(dt));
        updateHUD(); checkClear(); drawMinimap();
        if ((performance.now()-startTime)/1000 > 5) instructionsEl.style.opacity = '0';
      }
      renderer.render(scene, camera);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
